services:
  # Python Backend Service
  backend:
    build: 
      context: ./backend
    container_name: cqnms-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - FRONTEND_ORIGIN=http://localhost:3000
      # Windows Authentication doesn't reach the host from inside this Linux
      # container, so this connects to the host's SQL Server over TCP with a SQL
      # login instead (one-time SQL Server setup required - see project docs).
      - DB_ENABLED=true
      - DB_SERVER=host.docker.internal,1433
      - DB_NAME=CQNMS_DB
      - DB_USER=cqnms_app
      - DB_PASSWORD=${DB_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Next.js Frontend Service
  frontend:
    build:
      context: ./front-end
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: cqnms-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend